domain-needed
bogus-priv
no-resolv
log-dhcp
log-queries

# Replace the interface name and DHCP range for your lab before enabling.
interface=eno1
bind-interfaces

# MAC-gated DHCP: only explicit entries in dhcp.hosts receive leases.
dhcp-hostsfile=/etc/dnsmasq.d/dhcp.hosts
dhcp-ignore=tag:!known
dhcp-range=192.168.50.100,192.168.50.150,255.255.255.0,12h

# Basic PXE/TFTP support. Replace the boot filename with your real boot chain.
enable-tftp
tftp-root=/srv/tftp
dhcp-boot=undionly.kpxe
pxe-service=x86PC,"Network Boot",undionly.kpxe

# Upstream DNS for lab clients.
server=1.1.1.1
server=8.8.8.8
